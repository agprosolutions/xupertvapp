<!DOCTYPE html>
<html>
<head>
<title>Acceso</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
text-align:center;
}

.box{margin-top:100px;}

input{
padding:12px;
border-radius:10px;
border:none;
width:80%;
margin-top:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
margin-top:10px;
width:80%;
}
</style>

</head>

<body>

<div class="box">

<h1>🔐 Acceso requerido</h1>
<p>Introduce tu código</p>

<input id="code" placeholder="Código">
<button onclick="checkCode()">Entrar</button>

<p style="margin-top:20px;">¿No tienes acceso?</p>

<a href="https://www.paypal.com/paypalme/anto7004/2">
<button>💳 Comprar acceso</button>
</a>

</div>

<script>
var codigosValidos = [
"VIP123",
"PRO777",
"APP2026"
];

function checkCode(){
var code = document.getElementById("code").value;

if(codigosValidos.includes(code)){
// 🔥 CAMBIO IMPORTANTE AQUÍ
window.location.href = "apps2.html";
}else{
alert("Código incorrecto");
}
}
</script>

</body>
</html>
